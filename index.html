<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 40px;
    }
    input, button {
      padding: 10px;
      font-size: 16px;
      margin: 10px;
    }
    #show-input {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }
    .image-item img {
      width: 100%;
      border-radius: 8px;
      height: auto;
    }
    </style>

</head>
<body>
    <input type="text" placeholder="enter your images" id="inputvalue"> 
    
    <button onclick="searchImages()">Search</button>

    <div id="show-input"></div>

    <script>
        const accessKey = "vSfRzbXpAJfISdCMgiSS-QDpY5XFx5Ktnl1MdFWGjAo"


        async function  searchImages() {
            const query = document.getElementById("inputvalue").value.trim();
            const showdata = document.getElementById("show-input")

            showdata.innerHTML= '' // clear the previously fetched data

            if(!query) {
                alert("please enter a keyword");
                return;
            }
            
            try {
                const response = await fetch(`https://api.unsplash.com/search/photos?query=${query}&client_id=${accessKey}&per_page=30`);
                const data = await response.json()

                console.log(data)

                if(data.results.length > 0) {
                    data.results.forEach(photo => {
                        const img = document.createElement("img");
                        img.src = photo.urls.regular;
                        img.alt = photo.alt_description || "unsplash images"

                        const div = document.createElement("div");
                        div.className = "image-item";
                        div.appendChild(img)

                        showdata.appendChild(div)

                    });

                }

                else {
                    alert("No images found. Try another keyword.");
                }
            }

            catch(err) {
                console.log(err)
            }
        }

    </script>

</body>
</html>
